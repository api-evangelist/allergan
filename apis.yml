description: >-
  Allergan was a global pharmaceutical company that developed, manufactured,
  and commercialized branded therapeutics, devices, and biologic products
  across medical aesthetics, eye care, central nervous system, and
  gastroenterology. The company was the maker of Botox (botulinum toxin),
  Juvederm (injectable filler), CoolSculpting, Alphagan, Vraylar, Linzess,
  and Ubrelvy. AbbVie completed its $63 billion acquisition of Allergan in
  May 2020. The company now operates as Allergan Aesthetics, an AbbVie company.
  Allergan Data Labs, the digital innovation arm, built the Alle loyalty
  platform serving over 3 million users across nearly 20,000 medical offices
  and spas in the US, using machine learning for personalized consumer
  engagement in medical aesthetics. Allergan Aesthetics does not maintain a
  public developer API program.
